<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" name="viewport" />
    <title>Register &mdash; RPPH Sul-Sel</title>

    <!-- General CSS Files -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css"
        integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous" />

    <!-- CSS Libraries -->
        <link rel="stylesheet" href="/library/selectric/public/selectric.css">

    <style>
        .custom-alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }

        .custom-alert-overlay.show {
            display: flex;
        }

        .custom-alert-box {
            background: #ffffff;
            width: 90%;
            max-width: 420px;
            padding: 32px 26px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
            animation: popupScale 0.25s ease;
        }

        .custom-alert-icon {
            width: 76px;
            height: 76px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: #fff3cd;
            color: #ff9800;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
        }

        .custom-alert-box h5 {
            font-weight: 700;
            margin-bottom: 10px;
            color: #34395e;
        }

        .custom-alert-box p {
            color: #6c757d;
            font-size: 15px;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .password-input-error {
            border-color: #fc544b !important;
        }

        .password-input-error:focus {
            border-color: #fc544b !important;
            box-shadow: 0 0 0 0.2rem rgba(252, 84, 75, 0.18) !important;
        }

        @keyframes popupScale {
            from {
                transform: scale(0.85);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>

    <!-- Template CSS -->
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/library/selectric/public/selectric.css">

</head>

<body>
    <div id="app">
        <section class="section">
            <div class="container mt-5">
                <div class="row">
                    <div
                        class=" col-12 col-sm-10 offset-sm-1 col-md-8 offset-md-2 col-lg-8 offset-lg-2 col-xl-8 offset-xl-2 ">

                        
                        <div class="login-brand">
    <img src="/landing/images/footer/Dekranasda.png" alt="logo" width="200" class="shadow-light rounded-circle" />
    <!-- <img src="https://e7.pngegg.com/pngimages/690/421/png-clipart-logo-graphics-jpeg-cdr-logo.png" alt="logo" width="100" class="shadow-light rounded-circle" /> -->

</div>

                        
                            <div class="card card-primary">
        <div class="card-header">
            <h4>Register</h4>
        </div>

        <div class="card-body">
            <form method="POST" action="http://127.0.0.1:8000/auth/register_action" id="formRegister">
                <input type="hidden" name="_token" value="UhSXpjTSsFge67d3rpN83gA2NWHU8HGTH8GM0RP0" autocomplete="off">
                
                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input 
                        id="name" 
                        type="text"
                        class="form-control "
                        name="name" 
                        value="" 
                        required 
                        autofocus>

                                    </div>

                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        id="username" 
                        type="text"
                        class="form-control "
                        name="username" 
                        value="" 
                        required>

                                    </div>

                
                <input type="hidden" name="jabatan" value="-">

                
                <div class="row">
                    <div class="form-group col-6">
                        <label for="password">Password</label>
                        <input 
                            id="password" 
                            type="password"
                            class="form-control "
                            name="password" 
                            required>

                        <small class="text-muted">Minimal 6 karakter</small>

                                            </div>

                    <div class="form-group col-6">
                        <label for="password_confirmation">Konfirmasi Password</label>
                        <input 
                            id="password_confirmation" 
                            type="password"
                            class="form-control"
                            name="password_confirmation" 
                            required>
                    </div>
                </div>

                
                <input type="hidden" name="role" value="user">

                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-lg btn-block">
                        Register
                    </button>
                </div>

                
                <div class="text-center mt-3">
                    Sudah punya akun?
                    <a href="http://127.0.0.1:8000/auth">Login</a>
                </div>
            </form>
        </div>
    </div>

    
    <div id="passwordAlert" class="custom-alert-overlay">
        <div class="custom-alert-box">
            <div class="custom-alert-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>

            <h5>Password Terlalu Pendek</h5>

            <p>
                Password harus memiliki minimal 6 karakter.
                Silakan masukkan password yang lebih panjang agar akun lebih aman.
            </p>

            <button type="button" id="closePasswordAlert" class="btn btn-primary px-4">
                Mengerti
            </button>
        </div>
    </div>

                        
                        <div class="simple-footer">Copyright &copy; RPPH Sulawesi Selatan</div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- General JS Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous">
    </script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.nicescroll/3.7.6/jquery.nicescroll.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.24.0/moment.min.js"></script>
    <script src="/js/stisla.js"></script>
    <script src="/library/selectric/public/jquery.selectric.min.js"></script>
    <script src="/library/sweetalert/dist/sweetalert.min.js"></script>

    

    <!-- JS Libraies -->
        <script src="/library/jquery-pwstrength/pwstrength.js"></script>
    <script src="/library/selectric/public/jquery.selectric.min.js"></script>

    <script>
        const formRegister = document.getElementById('formRegister');
        const passwordInput = document.getElementById('password');
        const passwordAlert = document.getElementById('passwordAlert');
        const closePasswordAlert = document.getElementById('closePasswordAlert');

        formRegister.addEventListener('submit', function(e) {
            if (passwordInput.value.length < 6) {
                e.preventDefault();

                passwordInput.classList.add('password-input-error');
                passwordAlert.classList.add('show');
                passwordInput.focus();
            }
        });

        closePasswordAlert.addEventListener('click', function() {
            passwordAlert.classList.remove('show');
        });

        passwordAlert.addEventListener('click', function(e) {
            if (e.target === passwordAlert) {
                passwordAlert.classList.remove('show');
            }
        });

        passwordInput.addEventListener('input', function() {
            if (passwordInput.value.length >= 6) {
                passwordInput.classList.remove('password-input-error');
            }
        });
    </script>


    <!-- Template JS File -->
    <script src="/js/scripts.js"></script>
    <script src="/js/custom.js"></script>

    <!-- Page Specific JS File -->
    </body>

</html>
